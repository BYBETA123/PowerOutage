<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign In</title>
</head>
<body>
    <div id="landingPage" >
        <h1>
        Choose your name
        </h1>
        <input type="text" id="name" placeholder="Enter your name" />
        <button type="button" id="button">Click Me!</button>
    </div>
    <div id="waitingRoom" style="display:none">
        <h1 id="greeting">Greetings!!</h1>
        <h1 id="waitingMessage">Waiting for other players...</h1>
        <div id="findThisColor" style="width: 200px; height: 100px; background-color: #04af2f;"></div>   
        <div id="myColor" style="width: 200px; height: 100px; background-color: #000000;"></div>
         <div class="slider-container">
            <label for="mySlider">Red:</label>
            <input type="range" id="mySliderRed" min="0" max="256" value="50" class="slider">
            <label for="mySlider" id="RedHex">#00</label>
        </div>
         <div class="slider-container">
            <label for="mySlider">Green:</label>
            <input type="range" id="mySliderGreen" min="0" max="256" value="50" class="slider">
            <label for="mySlider" id="GreenHex">#00</label>
        </div>
         <div class="slider-container">
            <label for="mySlider">Blue:</label>
            <input type="range" id="mySliderBlue" min="0" max="256" value="50" class="slider">
            <label for="mySlider" id="BlueHex">#00</label>
        </div>
        <label id="scoreLabel">Score: 0</label>
        <button type="button" id="checkColor">Submit</button>
    </div>

    <div id="buzzerRoomGuest" style="display:none">
        <h1>Welcome to the Buzzer</h1>
        <button type="button" id="buzzInButton">Buzz In!!</button>
    </div>

    <div id="buzzerRoomHost" style="display:none">
        <button type="button" id="rmtp">Remove Top Buzzer</button>
        <button type="button" id="clr">Clear Buzzers</button>
        <button type="button" id="lockbuzzer">Lock Buzzers</button>
        <button type="button" id="unlockbuzzer">Unlock Buzzers</button>
        <h1>Welcome to the Buzzer as a HOST!!</h1>
        <ul id="buzzersUl"></ul>
    </div>

    <div id="host" style="display:none">
        <h1 id="hostGreeting">Welcome, Host!</h1>
        <h1 id="hostMessage">You are the host. Waiting for players to join...</h1>
        <p id="playersList"> Players in the room: </p>
        <ul id="playersUl"></ul>


        <p id="gameOptions"> Game Options: </p>
        <ul id="gameOptionsUl">
            <li><button id="buzzerBtn">Buzzer</button></li>
            <li><button id="game2Btn">Game 2</button></li>
            <li><button id="game3Btn">Game 3</button></li>
        </ul>
        <p id="picked"> Picked Game: </p>
        <button type="button" id="startGameBtn">Start Game</button>
    </div>
    <div id="whiteRoom" style="display:none">
    </div>
    <script type="module" src="scripts/main.js"></script>
    <script type="module" src="scripts/buzzer.js"></script>
    <script type="module" src="scripts/colors.js"></script>
</body>
</html>
